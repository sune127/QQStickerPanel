name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\QQStickerPanel.sln

      - name: Publish framework-dependent package
        shell: pwsh
        run: .\scripts\publish-win-x64.ps1 -DeploymentMode FrameworkDependentSingleFile

      - name: Publish self-contained package
        shell: pwsh
        run: .\scripts\publish-win-x64.ps1 -DeploymentMode SelfContainedSingleFile

      - name: Prepare release assets
        shell: pwsh
        run: |
          Copy-Item `
            -Path .\artifacts\QQStickerPanel-win-x64-framework-dependent\QQStickerPanel.exe `
            -Destination .\artifacts\QQStickerPanel-win-x64-framework-dependent.exe `
            -Force

          Copy-Item `
            -Path .\artifacts\QQStickerPanel-win-x64-self-contained\QQStickerPanel.exe `
            -Destination .\artifacts\QQStickerPanel-win-x64-self-contained.exe `
            -Force

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          @"
          ## Downloads

          - `QQStickerPanel-win-x64-framework-dependent.exe`: smaller executable. Requires Microsoft .NET 8 Windows Desktop Runtime x64.
          - `QQStickerPanel-win-x64-self-contained.exe`: larger executable. Does not require a separate .NET runtime installation.

          ## Validation

          - Built on GitHub Actions with .NET 8 and Windows.
          "@ | Set-Content -Path $notesPath -Encoding UTF8

          gh release create $tag `
            .\artifacts\QQStickerPanel-win-x64-framework-dependent.exe `
            .\artifacts\QQStickerPanel-win-x64-self-contained.exe `
            --title "QQStickerPanel $tag" `
            --notes-file $notesPath `
            --latest
